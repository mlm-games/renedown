[package]
name = "renedown"
version.workspace = true
edition.workspace = true
publish = false
default-run = "renedown-desktop"

[lib]
name = "renedown"
crate-type = ["cdylib"]

[features]
default = []

[[bin]]
name = "renedown-desktop"
path = "src/main.rs"

[package.metadata.android]
package = "com.example.renedown"
apk_name = "renedown"
target_sdk_version = 34
min_sdk_version = 26
build_targets = ["aarch64-linux-android"]
split_per_abi = true

[package.metadata.android.application]
label = "Repose Markdown"
fullscreen = false

[dependencies]
repose-core.workspace = true
repose-ui.workspace = true
repose-material.workspace = true
pulldown-cmark = "0.13"

winit = { workspace = true }
env_logger = { workspace = true }
anyhow = { workspace = true }
log = { workspace = true }

[target.'cfg(target_os = "android")'.dependencies]
repose-platform = { workspace = true }
android_logger = { workspace = true }

[target.'cfg(all(not(target_os = "android"), not(target_arch = "wasm32")))'.dependencies]
repose-platform = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
web-sys = { workspace = true }
console_error_panic_hook = { workspace = true }
console_log = { workspace = true }
log.workspace = true
getrandom = { workspace = true, features = ["wasm_js"] }
wgpu = { workspace = true, features = ["webgpu", "webgl"] }
repose-platform = { workspace = true }
repose-render-wgpu.workspace = true
