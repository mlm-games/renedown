name: AUR upload (retorrent-bin)
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release version (e.g. 0.3.1)"
        required: true

jobs:
  aur-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download release artifacts
        uses: robinraju/release-downloader@v1
        with:
          tag: v${{ inputs.version_name }}
          fileName: '*.tar.gz'
          out-file-path: artifacts

      - name: Generate PKGBUILD
        shell: bash
        run: |
          set -euo pipefail
          PKG="renedown"
          VER="${{ inputs.version_name }}"

          SHA256_X86_64=$(sha256sum artifacts/*x86_64*.tar.gz | cut -d' ' -f1)
          SHA256_AARCH64=$(sha256sum artifacts/*aarch64*.tar.gz | cut -d' ' -f1)

          cat > PKGBUILD <<-EOF
          # Maintainer: MLM Games <dev@mlm.games>
          pkgname=${PKG}-bin
          pkgver=${VER}
          pkgrel=1
          pkgdesc="Cross-platform Markdown viewer/editor built with Repose"
          arch=('x86_64' 'aarch64')
          url="https://github.com/mlm-games/${PKG}"
          license=('LGPL-2.1')
          provides=('${PKG}')
          conflicts=('${PKG}')
          source_x86_64=("https://github.com/mlm-games/${PKG}/releases/download/v${PKGVER}/${PKG}-${PKGVER}-x86_64-unknown-linux-gnu.tar.gz")
          source_aarch64=("https://github.com/mlm-games/${PKG}/releases/download/v${PKGVER}/${PKG}-${PKGVER}-aarch64-unknown-linux-gnu.tar.gz")
          sha256sums_x86_64=('${SHA256_X86_64}')
          sha256sums_aarch64=('${SHA256_AARCH64}')

          package() {
            cd "\${srcdir}"
            install -Dm755 ${PKG} "\${pkgdir}/usr/bin/${PKG}"
            install -Dm644 LICENSE "\${pkgdir}/usr/share/licenses/${PKG}/LICENSE"
          }
          EOF
          cat PKGBUILD

      - name: Publish to AUR
        uses: mlm-games/aur-deploy-action@v1
        with:
          package: renedown-bin
          ssh_key: ${{ secrets.AUR_SSH_KEY }}
